<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <!--<meta name="theme-color" content="#000000" />-->
    <meta
      name="description"
      content="a lightweight note app"
    />
    <link rel="apple-touch-icon" href="/logo_192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>mote</title>
    <script>
      ;(() => {
        const colorThemes = ['celadon', 'dawn', 'ink', 'nocturne']
        const legacyColorThemes = {
          classic: 'celadon',
          moss: 'celadon',
          candy: 'celadon',
          voltage: 'celadon',
          sakura: 'nocturne',
          aurora: 'nocturne',
          fjord: 'nocturne',
          dune: 'nocturne',
          blueprint: 'ink',
          rouge: 'ink',
        }
        let theme = localStorage.getItem('theme')
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }

        let colorTheme = localStorage.getItem('colorTheme')
        if (legacyColorThemes[colorTheme]) {
          colorTheme = legacyColorThemes[colorTheme]
          localStorage.setItem('colorTheme', colorTheme)
        }
        if (!colorThemes.includes(colorTheme)) {
          colorTheme = 'celadon'
        }

        document.documentElement.dataset.theme = theme
        document.documentElement.dataset.colorTheme = colorTheme
        document.documentElement.style.colorScheme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
