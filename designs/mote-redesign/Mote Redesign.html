<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mote · 重设计原型</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='%2320715f'/%3E%3C/svg%3E" />
<style>
/* ============================================================
   Mote Redesign — 设计令牌
   4 套主题（曦 dawn / 墨 ink / 青 celadon / 紫 wisteria）× 明暗
   令牌命名与 frontend/src/index.css 对齐，便于落地。
   ============================================================ */
:root {
  --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue",
    "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Source Han Sans SC", sans-serif;
  --font-serif: Georgia, "Times New Roman", "Songti SC", "Noto Serif SC", serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "PingFang SC", monospace;
  --safe-top: 0px;
  --safe-bottom: 0px;
}

/* ---------- 曦 dawn · 晨光纸面 + 蔚蓝 ---------- */
[data-color-theme="dawn"][data-theme="light"] {
  --background: hsl(40 26% 97%);
  --foreground: hsl(230 22% 13%);
  --card: hsl(0 0% 100%);
  --card-2: hsl(40 20% 94.5%);
  --muted-foreground: hsl(230 10% 44%);
  --faint: hsl(230 8% 64%);
  --border: hsl(40 14% 88%);
  --border-strong: hsl(40 12% 80%);
  --primary: hsl(216 78% 49%);
  --primary-foreground: hsl(0 0% 100%);
  --primary-tint: hsl(216 78% 49% / 0.09);
  --primary-tint-2: hsl(216 78% 49% / 0.16);
  --accent: hsl(28 84% 54%);
  --destructive: hsl(4 72% 50%);
  --glow-a: hsl(216 80% 72% / 0.16);
  --glow-b: hsl(28 84% 70% / 0.12);
  --radius: 11px;
  --shadow-1: 0 1px 2px hsl(230 30% 8% / 0.04), 0 1px 1px hsl(230 30% 8% / 0.03);
  --shadow-2: 0 1px 2px hsl(230 30% 8% / 0.05), 0 10px 24px -8px hsl(230 30% 8% / 0.11);
  --shadow-3: 0 2px 6px hsl(230 30% 8% / 0.06), 0 24px 48px -12px hsl(230 30% 8% / 0.20);
}
[data-color-theme="dawn"][data-theme="dark"] {
  --background: hsl(226 22% 11.5%);
  --foreground: hsl(224 24% 87%);
  --card: hsl(226 20% 15%);
  --card-2: hsl(226 18% 19%);
  --muted-foreground: hsl(224 12% 63%);
  --faint: hsl(224 10% 46%);
  --border: hsl(226 15% 23%);
  --border-strong: hsl(226 14% 30%);
  --primary: hsl(214 90% 68%);
  --primary-foreground: hsl(226 45% 9%);
  --primary-tint: hsl(214 90% 68% / 0.12);
  --primary-tint-2: hsl(214 90% 68% / 0.2);
  --accent: hsl(28 82% 62%);
  --destructive: hsl(4 78% 62%);
  --glow-a: hsl(214 90% 40% / 0.2);
  --glow-b: hsl(28 60% 40% / 0.1);
  --radius: 11px;
  --shadow-1: 0 1px 2px hsl(0 0% 0% / 0.25);
  --shadow-2: 0 2px 4px hsl(0 0% 0% / 0.28), 0 12px 28px -10px hsl(0 0% 0% / 0.5);
  --shadow-3: 0 4px 12px hsl(0 0% 0% / 0.38), 0 28px 60px -14px hsl(0 0% 0% / 0.6);
}

/* ---------- 墨 ink · 纸墨编辑部 + 朱砂 ---------- */
[data-color-theme="ink"][data-theme="light"] {
  --background: hsl(30 15% 98.5%);
  --foreground: hsl(20 8% 8%);
  --card: hsl(0 0% 100%);
  --card-2: hsl(28 10% 94%);
  --muted-foreground: hsl(20 6% 42%);
  --faint: hsl(20 5% 62%);
  --border: hsl(28 9% 87%);
  --border-strong: hsl(28 8% 76%);
  --primary: hsl(9 68% 46%);
  --primary-foreground: hsl(0 0% 100%);
  --primary-tint: hsl(9 68% 46% / 0.08);
  --primary-tint-2: hsl(9 68% 46% / 0.15);
  --accent: hsl(9 68% 46%);
  --destructive: hsl(0 78% 48%);
  --glow-a: hsl(9 70% 70% / 0.10);
  --glow-b: hsl(30 30% 70% / 0.12);
  --radius: 6px;
  --shadow-1: 0 1px 2px hsl(20 20% 8% / 0.04), 0 1px 1px hsl(20 20% 8% / 0.03);
  --shadow-2: 0 1px 2px hsl(20 20% 8% / 0.05), 0 10px 24px -8px hsl(20 20% 8% / 0.10);
  --shadow-3: 0 2px 6px hsl(20 20% 8% / 0.06), 0 24px 48px -12px hsl(20 20% 8% / 0.18);
}
[data-color-theme="ink"][data-theme="dark"] {
  --background: hsl(24 6% 8%);
  --foreground: hsl(32 10% 87%);
  --card: hsl(24 6% 11.5%);
  --card-2: hsl(24 6% 15.5%);
  --muted-foreground: hsl(28 7% 60%);
  --faint: hsl(28 5% 43%);
  --border: hsl(24 6% 19%);
  --border-strong: hsl(24 6% 27%);
  --primary: hsl(10 78% 62%);
  --primary-foreground: hsl(24 20% 7%);
  --primary-tint: hsl(10 78% 62% / 0.11);
  --primary-tint-2: hsl(10 78% 62% / 0.19);
  --accent: hsl(10 78% 62%);
  --destructive: hsl(0 76% 62%);
  --glow-a: hsl(10 70% 34% / 0.14);
  --glow-b: hsl(30 20% 30% / 0.14);
  --radius: 6px;
  --shadow-1: 0 1px 2px hsl(0 0% 0% / 0.28);
  --shadow-2: 0 2px 4px hsl(0 0% 0% / 0.3), 0 12px 28px -10px hsl(0 0% 0% / 0.52);
  --shadow-3: 0 4px 12px hsl(0 0% 0% / 0.4), 0 28px 60px -14px hsl(0 0% 0% / 0.62);
}

/* ---------- 青 celadon · 青瓷 + 茶褐 ---------- */
[data-color-theme="celadon"][data-theme="light"] {
  --background: hsl(158 26% 96.5%);
  --foreground: hsl(172 32% 10%);
  --card: hsl(150 36% 99%);
  --card-2: hsl(158 22% 92.5%);
  --muted-foreground: hsl(168 12% 40%);
  --faint: hsl(168 9% 58%);
  --border: hsl(158 16% 85%);
  --border-strong: hsl(158 15% 75%);
  --primary: hsl(170 58% 30%);
  --primary-foreground: hsl(155 60% 97%);
  --primary-tint: hsl(170 58% 30% / 0.09);
  --primary-tint-2: hsl(170 58% 30% / 0.16);
  --accent: hsl(22 62% 48%);
  --destructive: hsl(4 70% 48%);
  --glow-a: hsl(170 58% 58% / 0.15);
  --glow-b: hsl(22 62% 62% / 0.10);
  --radius: 13px;
  --shadow-1: 0 1px 2px hsl(172 40% 8% / 0.04), 0 1px 1px hsl(172 40% 8% / 0.03);
  --shadow-2: 0 1px 2px hsl(172 40% 8% / 0.05), 0 10px 24px -8px hsl(172 40% 8% / 0.11);
  --shadow-3: 0 2px 6px hsl(172 40% 8% / 0.06), 0 24px 48px -12px hsl(172 40% 8% / 0.2);
}
[data-color-theme="celadon"][data-theme="dark"] {
  --background: hsl(172 26% 9%);
  --foreground: hsl(158 18% 84%);
  --card: hsl(171 22% 12.5%);
  --card-2: hsl(170 19% 16.5%);
  --muted-foreground: hsl(162 12% 60%);
  --faint: hsl(162 9% 43%);
  --border: hsl(170 17% 20%);
  --border-strong: hsl(170 15% 28%);
  --primary: hsl(165 52% 56%);
  --primary-foreground: hsl(172 40% 7%);
  --primary-tint: hsl(165 52% 56% / 0.11);
  --primary-tint-2: hsl(165 52% 56% / 0.19);
  --accent: hsl(26 70% 60%);
  --destructive: hsl(5 74% 60%);
  --glow-a: hsl(165 52% 32% / 0.18);
  --glow-b: hsl(26 50% 34% / 0.12);
  --radius: 13px;
  --shadow-1: 0 1px 2px hsl(0 0% 0% / 0.26);
  --shadow-2: 0 2px 4px hsl(0 0% 0% / 0.3), 0 12px 28px -10px hsl(0 0% 0% / 0.5);
  --shadow-3: 0 4px 12px hsl(0 0% 0% / 0.38), 0 28px 60px -14px hsl(0 0% 0% / 0.6);
}

/* ---------- 紫 wisteria · 紫藤薄暮 + 玫瑰 ---------- */
[data-color-theme="wisteria"][data-theme="light"] {
  --background: hsl(282 30% 97.5%);
  --foreground: hsl(279 30% 12%);
  --card: hsl(288 42% 99.5%);
  --card-2: hsl(278 22% 93%);
  --muted-foreground: hsl(278 12% 44%);
  --faint: hsl(278 10% 63%);
  --border: hsl(278 18% 88%);
  --border-strong: hsl(278 16% 78%);
  --primary: hsl(278 56% 52%);
  --primary-foreground: hsl(0 0% 100%);
  --primary-tint: hsl(278 56% 52% / 0.08);
  --primary-tint-2: hsl(278 56% 52% / 0.15);
  --accent: hsl(328 60% 55%);
  --destructive: hsl(4 72% 50%);
  --glow-a: hsl(278 66% 72% / 0.15);
  --glow-b: hsl(328 66% 72% / 0.11);
  --radius: 14px;
  --shadow-1: 0 1px 2px hsl(279 40% 10% / 0.04), 0 1px 1px hsl(279 40% 10% / 0.03);
  --shadow-2: 0 1px 2px hsl(279 40% 10% / 0.05), 0 10px 24px -8px hsl(279 40% 10% / 0.11);
  --shadow-3: 0 2px 6px hsl(279 40% 10% / 0.06), 0 24px 48px -12px hsl(279 40% 10% / 0.2);
}
[data-color-theme="wisteria"][data-theme="dark"] {
  --background: hsl(276 28% 11%);
  --foreground: hsl(276 24% 84%);
  --card: hsl(275 24% 14.5%);
  --card-2: hsl(274 22% 18.5%);
  --muted-foreground: hsl(276 14% 62%);
  --faint: hsl(276 12% 44%);
  --border: hsl(274 18% 22%);
  --border-strong: hsl(274 16% 30%);
  --primary: hsl(277 80% 74%);
  --primary-foreground: hsl(276 45% 10%);
  --primary-tint: hsl(277 80% 74% / 0.11);
  --primary-tint-2: hsl(277 80% 74% / 0.19);
  --accent: hsl(328 68% 70%);
  --destructive: hsl(4 78% 64%);
  --glow-a: hsl(278 78% 48% / 0.2);
  --glow-b: hsl(328 60% 44% / 0.12);
  --radius: 14px;
  --shadow-1: 0 1px 2px hsl(0 0% 0% / 0.28);
  --shadow-2: 0 2px 4px hsl(0 0% 0% / 0.32), 0 12px 28px -10px hsl(0 0% 0% / 0.52);
  --shadow-3: 0 4px 12px hsl(0 0% 0% / 0.4), 0 28px 60px -14px hsl(0 0% 0% / 0.62);
}

/* ============================================================
   基础
   ============================================================ */
* { box-sizing: border-box; }
html, body, #root { height: 100%; }
html { font-size: 16px; }
body {
  margin: 0;
  font-family: var(--font-ui);
  font-size: 15px;
  line-height: 1.6;
  color: hsl(230 15% 20%);
  background: hsl(230 14% 95%);
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font: inherit; color: inherit; background: none; border: none; padding: 0; cursor: pointer; }
input, textarea { font: inherit; color: inherit; }
::selection { background: var(--primary-tint-2); }
:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 4px; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-thumb:hover { background-color: var(--faint); background-clip: content-box; }
::-webkit-scrollbar-track { background: transparent; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ============================================================
   舞台 / 应用外壳
   ============================================================ */
.stage { height: 100%; }
.stage.phone {
  display: flex; align-items: center; justify-content: center;
  padding: 28px 16px;
  background:
    radial-gradient(circle at 15% 0%, hsl(230 30% 99%), transparent 42rem),
    radial-gradient(circle at 100% 100%, hsl(250 24% 92%), transparent 40rem),
    hsl(233 18% 94%);
  overflow: auto;
}
.app {
  position: relative;
  height: 100%;
  overflow: hidden;
  container-type: inline-size;
  container-name: app;
  color: var(--foreground);
  background:
    radial-gradient(circle at 0% 0%, var(--glow-a), transparent 34rem),
    radial-gradient(circle at 100% 100%, var(--glow-b), transparent 36rem),
    var(--background);
  transition: color 320ms ease, background 320ms ease;
}

/* ============================================================
   通用控件
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  height: 34px; padding: 0 14px;
  border-radius: calc(var(--radius) - 2px);
  font-size: 13.5px; font-weight: 500;
  border: 1px solid transparent;
  transition: background 160ms ease, color 160ms ease, border-color 160ms ease,
    box-shadow 160ms ease, transform 120ms ease;
  user-select: none; white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: var(--primary-foreground); box-shadow: var(--shadow-1); }
.btn-primary:hover { filter: brightness(1.06); box-shadow: var(--shadow-2); }
.btn-soft { background: var(--card-2); color: var(--foreground); }
.btn-soft:hover { background: var(--primary-tint); color: var(--primary); }
.btn-outline { border-color: var(--border-strong); color: var(--foreground); background: var(--card); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-ghost { color: var(--muted-foreground); }
.btn-ghost:hover { background: var(--card-2); color: var(--foreground); }
.btn-danger-ghost { color: var(--destructive); }
.btn-danger-ghost:hover { background: color-mix(in srgb, var(--destructive) 10%, transparent); }
.btn.block { width: 100%; }
.btn.lg { height: 38px; font-size: 14px; }

.icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; flex: none;
  border-radius: calc(var(--radius) - 3px);
  color: var(--muted-foreground);
  transition: background 150ms ease, color 150ms ease, transform 120ms ease;
}
.icon-btn:hover { background: var(--card-2); color: var(--foreground); }
.icon-btn:active { transform: scale(0.92); }
.icon-btn.sm { width: 27px; height: 27px; }
.icon-btn.active { color: var(--primary); background: var(--primary-tint); }

.seg {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 3px; border-radius: calc(var(--radius) - 2px);
  background: var(--card-2);
}
.seg-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 26px; min-width: 30px; padding: 0 10px;
  border-radius: calc(var(--radius) - 5px);
  font-size: 12.5px; font-weight: 500; color: var(--muted-foreground);
  transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
}
.seg-btn.active { background: var(--card); color: var(--foreground); box-shadow: var(--shadow-1); }
.seg-btn:not(.active):hover { color: var(--foreground); }

.hairline { border: none; border-top: 1px solid var(--border); margin: 0; }

/* 自定义复选框 */
.cbx {
  position: relative; width: 16px; height: 16px; flex: none;
  border-radius: 5px; border: 1.5px solid var(--border-strong);
  background: var(--card);
  display: inline-flex; align-items: center; justify-content: center;
  transition: background 140ms ease, border-color 140ms ease, opacity 140ms ease, transform 120ms ease;
  color: var(--primary-foreground);
}
.cbx:active { transform: scale(0.9); }
.cbx svg { opacity: 0; transform: scale(0.5); transition: opacity 130ms ease, transform 130ms cubic-bezier(0.34, 1.56, 0.64, 1); }
.cbx.on { background: var(--primary); border-color: var(--primary); }
.cbx.on svg { opacity: 1; transform: scale(1); }
.cbx.semi { background: var(--primary); border-color: var(--primary); }
.cbx.semi::after { content: ""; width: 8px; height: 2px; border-radius: 2px; background: var(--primary-foreground); }

/* 弹出菜单 */
.pop-wrap { position: relative; }
/* hover 的 transform 会把卡片变成层叠上下文，菜单打开时抬升宿主避免被后续卡片遮盖 */
.memo:has(.menu), .gcard:has(.menu), .lrow:has(.menu), .srow:has(.menu) { z-index: 45; }
.menu {
  position: absolute; z-index: 60; top: calc(100% + 6px); right: 0;
  min-width: 148px; padding: 5px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 1px); box-shadow: var(--shadow-3);
  animation: pop-in 160ms cubic-bezier(0.2, 0.9, 0.3, 1.2) both;
}
.menu.left { right: auto; left: 0; }
.menu-item {
  display: flex; align-items: center; gap: 9px; width: 100%;
  padding: 7px 10px; border-radius: calc(var(--radius) - 4px);
  font-size: 13px; color: var(--foreground); text-align: left;
  transition: background 120ms ease;
}
.menu-item:hover { background: var(--card-2); }
.menu-item.danger { color: var(--destructive); }
.menu-item.danger:hover { background: color-mix(in srgb, var(--destructive) 9%, transparent); }
.menu-item svg { color: var(--muted-foreground); }
.menu-item.danger svg { color: var(--destructive); }
.menu-sep { border: none; border-top: 1px solid var(--border); margin: 5px 6px; }
.menu-colors { display: flex; align-items: center; gap: 13px; padding: 8px 12px 9px; }
.menu-colors .cdot { width: 15px; height: 15px; }
.menu-foot {
  padding: 6px 11px 5px; font-size: 11px; line-height: 1.7;
  color: var(--faint); border-top: 1px solid var(--border); margin-top: 5px;
}
@keyframes pop-in { from { opacity: 0; transform: translateY(-4px) scale(0.97); } to { opacity: 1; transform: none; } }

/* 模态 */
.overlay {
  position: absolute; inset: 0; z-index: 80;
  background: hsl(240 20% 4% / 0.42);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center; padding: 20px;
  animation: fade-in 200ms ease both;
}
.modal {
  width: min(400px, 100%);
  background: var(--card); border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 5px); box-shadow: var(--shadow-3);
  padding: 20px;
  animation: modal-in 240ms cubic-bezier(0.2, 0.9, 0.3, 1.1) both;
}
.modal h3 { margin: 0 0 4px; font-size: 15.5px; font-weight: 600; }
.modal .sub { margin: 0 0 16px; font-size: 13px; color: var(--muted-foreground); }
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes modal-in { from { opacity: 0; transform: translateY(14px) scale(0.97); } to { opacity: 1; transform: none; } }

/* 轻提示 */
.toaster {
  position: absolute; z-index: 120; left: 0; right: 0;
  bottom: calc(22px + var(--safe-bottom));
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  pointer-events: none;
}
.toast {
  display: flex; align-items: center; gap: 8px;
  max-width: 86%;
  padding: 9px 16px; border-radius: 99px;
  background: var(--card); border: 1px solid var(--border);
  box-shadow: var(--shadow-2);
  font-size: 13px; color: var(--foreground);
  animation: toast-in 260ms cubic-bezier(0.2, 0.9, 0.3, 1.2) both;
}
.toast.leaving { animation: toast-out 200ms ease both; }
@keyframes toast-in { from { opacity: 0; transform: translateY(12px) scale(0.95); } to { opacity: 1; transform: none; } }
@keyframes toast-out { from { opacity: 1; } to { opacity: 0; transform: translateY(6px) scale(0.97); } }

/* 输入框 */
.field {
  display: flex; align-items: center; gap: 8px;
  height: 34px; padding: 0 11px;
  border-radius: calc(var(--radius) - 2px);
  background: var(--card-2);
  border: 1px solid transparent;
  color: var(--muted-foreground);
  transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
}
.field input {
  border: none; outline: none; background: transparent;
  font-size: 13.5px; color: var(--foreground); width: 100%; min-width: 0;
}
.field input::placeholder { color: var(--faint); }
.field:focus-within {
  border-color: var(--primary); background: var(--card);
  box-shadow: 0 0 0 3px var(--primary-tint);
}

/* ============================================================
   笔记页
   ============================================================ */
.nb { display: flex; justify-content: center; gap: 44px; height: 100%; padding: 0 28px; }

/* ---- 侧栏 ---- */
.nb-side {
  width: 282px; flex: none;
  display: flex; flex-direction: column;
  padding: calc(22px + var(--safe-top)) 6px 18px;
  overflow-y: auto; scrollbar-width: none;
}
.nb-side::-webkit-scrollbar { display: none; }

.brand { display: flex; align-items: center; gap: 10px; padding: 0 10px; }
.logo-dot {
  width: 13px; height: 13px; border-radius: 50%; flex: none;
  background: radial-gradient(circle at 32% 30%, color-mix(in srgb, var(--primary) 45%, white), var(--primary) 72%);
  box-shadow: 0 0 12px color-mix(in srgb, var(--primary) 55%, transparent);
  transition: background 300ms ease, box-shadow 300ms ease;
}
.brand-name { font-size: 17.5px; font-weight: 650; letter-spacing: 0.015em; }
.brand-actions { margin-left: auto; display: flex; gap: 2px; }

.stats { display: flex; justify-content: space-between; margin-top: 24px; padding: 0 10px; }
.stat { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.stat:nth-child(2) { align-items: center; }
.stat:last-child { align-items: flex-end; }
.stat b {
  font-family: var(--font-serif); font-size: 21px; font-weight: 600;
  font-variant-numeric: tabular-nums; letter-spacing: 0.01em;
}
.stat span { font-size: 10.5px; letter-spacing: 0.14em; color: var(--faint); }

.hm { margin-top: 18px; padding: 0 10px; }
.hm-grid { display: grid; grid-template-rows: repeat(7, 11px); grid-auto-flow: column; grid-auto-columns: 11px; gap: 3.5px; justify-content: space-between; }
.hm-cell {
  width: 11px; height: 11px; border-radius: 3.5px;
  background: color-mix(in srgb, var(--foreground) 7.5%, transparent);
  position: relative;
  transition: transform 120ms ease, background 300ms ease;
}
.hm-cell[data-l="1"] { background: color-mix(in srgb, var(--primary) 26%, var(--card-2)); }
.hm-cell[data-l="2"] { background: color-mix(in srgb, var(--primary) 48%, var(--card-2)); }
.hm-cell[data-l="3"] { background: color-mix(in srgb, var(--primary) 72%, var(--card-2)); }
.hm-cell[data-l="4"] { background: var(--primary); }
.hm-cell.today { box-shadow: inset 0 0 0 1.5px var(--foreground); }
.hm-cell:hover { transform: scale(1.35); z-index: 2; }
.hm-cell:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 7px); left: 50%; transform: translateX(-50%);
  padding: 4px 9px; border-radius: 7px; white-space: nowrap;
  background: var(--foreground); color: var(--background);
  font-size: 11px; line-height: 1.4; font-weight: 500;
  box-shadow: var(--shadow-2); pointer-events: none; z-index: 10;
}
.hm-foot { display: flex; align-items: center; gap: 5px; margin-top: 9px; font-size: 10.5px; color: var(--faint); }
.hm-scale { display: inline-flex; gap: 3px; }
.hm-scale i { width: 9px; height: 9px; border-radius: 3px; }

.nav-list { display: flex; flex-direction: column; gap: 2px; margin-top: 22px; }
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 7.5px 10px; border-radius: calc(var(--radius) - 2px);
  font-size: 14px; font-weight: 500; color: var(--muted-foreground);
  transition: background 150ms ease, color 150ms ease;
  text-align: left; width: 100%;
}
.nav-item:hover { background: var(--card-2); color: var(--foreground); }
.nav-item.active { background: var(--primary-tint); color: var(--primary); }
.nav-item svg { flex: none; opacity: 0.85; }
.nav-item .aux { margin-left: auto; display: inline-flex; color: var(--faint); }
.nav-item .aux:hover { color: var(--primary); }
.nav-dot { width: 9px; height: 9px; border-radius: 50%; margin: 0 4.5px; flex: none; }
.nav-dot.red { background: hsl(0 72% 58%); }
.nav-dot.blue { background: hsl(217 80% 60%); }
.nav-dot.green { background: hsl(145 55% 47%); }

.tags-head {
  display: flex; align-items: baseline; gap: 8px;
  margin: 24px 0 6px; padding: 0 10px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.13em; color: var(--faint);
}
.tag-item {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 5.5px 10px; border-radius: calc(var(--radius) - 3px);
  font-size: 13.5px; color: var(--muted-foreground);
  transition: background 140ms ease, color 140ms ease;
  text-align: left;
}
.tag-item:hover { background: var(--card-2); color: var(--foreground); }
.tag-item.active { background: var(--primary-tint); color: var(--primary); }
.tag-item .hash { color: var(--faint); font-family: var(--font-serif); font-size: 13px; }
.tag-item.active .hash { color: var(--primary); opacity: 0.7; }
.tag-item .spx { flex: 1; }
.tag-item .count { font-size: 11.5px; color: var(--faint); font-variant-numeric: tabular-nums; }
.tag-item .pin-ico { color: var(--faint); opacity: 0.9; margin-left: 2px; }
/* 悬停时计数让位给操作按钮 */
.tag-item .tag-menu-btn { display: none; margin: -4px 0; }
.tag-item:hover .tag-menu-btn, .tag-item .tag-menu-btn.show, .app.coarse .tag-item .tag-menu-btn { display: inline-flex; }
.tag-item:hover .count, .tag-item:has(.tag-menu-btn.show) .count { display: none; }
.app.coarse .tag-item:not(:hover) .count { display: inline; }
.tag-kids { position: relative; margin-left: 19px; padding-left: 7px; }
.tag-kids::before { content: ""; position: absolute; left: 0; top: 4px; bottom: 4px; width: 1px; background: var(--border); }

.side-foot { margin-top: auto; padding-top: 22px; display: flex; flex-direction: column; gap: 2px; }

/* ---- 主列 ---- */
.nb-main {
  width: min(672px, 100%); min-width: 0;
  display: flex; flex-direction: column; height: 100%;
  padding-top: calc(14px + var(--safe-top));
}
.nb-top { display: flex; align-items: center; gap: 10px; height: 46px; flex: none; padding: 0 4px; }
.nb-title { display: flex; align-items: baseline; gap: 9px; min-width: 0; }
.nb-title h1 { margin: 0; font-size: 16.5px; font-weight: 650; letter-spacing: 0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nb-title .count { font-size: 12px; color: var(--faint); font-variant-numeric: tabular-nums; white-space: nowrap; }
.nb-top .sp { flex: 1; }
.nb-search { width: 200px; transition: width 200ms ease; }
.nb-search:focus-within { width: 250px; }

.composer {
  flex: none; margin: 8px 4px 4px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 4px);
  box-shadow: var(--shadow-1);
  transition: border-color 200ms ease, box-shadow 200ms ease;
}
.composer:focus-within {
  border-color: color-mix(in srgb, var(--primary) 45%, var(--border));
  box-shadow: 0 0 0 3.5px var(--primary-tint), var(--shadow-2);
}
.composer textarea {
  display: block; width: 100%; min-height: 64px; max-height: 40vh;
  padding: 15px 17px 4px; border: none; outline: none; resize: none;
  background: transparent; font-size: 15px; line-height: 1.75;
}
.composer textarea::placeholder { color: var(--faint); }
.composer-bar { display: flex; align-items: center; gap: 2px; padding: 7px 9px 9px; }
.composer-bar .sp { flex: 1; }
.cdots { display: flex; align-items: center; gap: 7px; margin-right: 9px; }
.cdot {
  width: 14px; height: 14px; border-radius: 50%; position: relative;
  opacity: 0.45; transition: opacity 140ms ease, transform 140ms ease, box-shadow 140ms ease;
}
.cdot:hover { opacity: 0.85; transform: scale(1.15); }
.cdot.on { opacity: 1; box-shadow: 0 0 0 2px var(--card), 0 0 0 3.5px currentColor; }
.cdot.red { background: hsl(0 72% 58%); color: hsl(0 72% 58%); }
.cdot.blue { background: hsl(217 80% 60%); color: hsl(217 80% 60%); }
.cdot.green { background: hsl(145 55% 47%); color: hsl(145 55% 47%); }

.feed {
  flex: 1; overflow-y: auto; min-height: 0;
  padding: 4px 4px calc(48px + var(--safe-bottom));
  mask-image: linear-gradient(to bottom, transparent 0, black 16px);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0, black 16px);
}
.day-row { display: flex; align-items: center; gap: 12px; margin: 26px 2px 12px; }
.day-row:first-child { margin-top: 14px; }
.day-label {
  font-family: var(--font-serif); font-size: 13px; color: var(--muted-foreground);
  letter-spacing: 0.04em; white-space: nowrap; font-variant-numeric: tabular-nums;
}
.day-rule { flex: 1; height: 1px; background: var(--border); }

.memo {
  position: relative;
  background: var(--card); border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 4px);
  padding: 15px 19px 15px; margin-bottom: 12px;
  box-shadow: var(--shadow-1);
  transition: box-shadow 200ms ease, transform 200ms ease, border-color 200ms ease, opacity 300ms ease;
  animation: memo-in 480ms cubic-bezier(0.19, 1, 0.22, 1) both;
  animation-delay: var(--d, 0ms);
}
.memo:hover { box-shadow: var(--shadow-2); transform: translateY(-1px); }
.memo.fresh { animation: memo-fresh 560ms cubic-bezier(0.19, 1, 0.22, 1) both; }
.memo.removing { opacity: 0; transform: scale(0.96); }
@keyframes memo-in { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
@keyframes memo-fresh {
  0% { opacity: 0; transform: translateY(-10px) scale(0.98); box-shadow: 0 0 0 4px var(--primary-tint-2); }
  60% { box-shadow: 0 0 0 4px var(--primary-tint); }
  100% { opacity: 1; transform: none; }
}

.memo-head { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; min-height: 27px; }
.memo-time {
  font-family: var(--font-serif); font-size: 12.5px; color: var(--faint);
  font-variant-numeric: tabular-nums; letter-spacing: 0.05em;
}
.memo-mark { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.memo-mark.red { background: hsl(0 72% 58%); box-shadow: 0 0 7px hsl(0 72% 58% / 0.55); }
.memo-mark.blue { background: hsl(217 80% 60%); box-shadow: 0 0 7px hsl(217 80% 60% / 0.55); }
.memo-mark.green { background: hsl(145 55% 47%); box-shadow: 0 0 7px hsl(145 55% 47% / 0.55); }
.memo-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--muted-foreground); }
.memo-badge svg { color: var(--primary); }
.memo-head .sp { flex: 1; }
.memo-menu-btn { opacity: 0; transition: opacity 160ms ease; }
.memo:hover .memo-menu-btn, .memo-menu-btn.open, .app.coarse .memo-menu-btn { opacity: 1; }

.memo-prose { font-size: 15px; line-height: 1.85; letter-spacing: 0.012em; color: color-mix(in srgb, var(--foreground) 88%, transparent); }
.memo-prose > *:first-child { margin-top: 0; }
.memo-prose > *:last-child { margin-bottom: 0; }
.memo-prose p { margin: 0.55em 0; overflow-wrap: break-word; }
.memo-prose strong { color: var(--foreground); font-weight: 600; }
.memo-prose h3 { font-size: 16px; margin: 0.6em 0 0.35em; color: var(--foreground); }
.memo-prose blockquote {
  margin: 0.7em 0; padding: 2px 0 2px 14px;
  border-left: 2px solid color-mix(in srgb, var(--primary) 55%, var(--border));
  color: var(--muted-foreground); font-family: var(--font-serif); font-size: 14.5px;
}
.memo-prose pre {
  margin: 0.7em 0; padding: 12px 14px; overflow-x: auto;
  background: var(--card-2); border-radius: calc(var(--radius) - 2px);
  font-family: var(--font-mono); font-size: 12.5px; line-height: 1.7;
}
.memo-prose code { font-family: var(--font-mono); font-size: 0.88em; }
.memo-prose p code { background: var(--card-2); padding: 0.15em 0.4em; border-radius: 5px; }
.memo-prose ul { margin: 0.5em 0; padding-left: 1.35em; }
.memo-prose li { margin: 0.22em 0; }
.tagchip {
  display: inline-block; margin: 0 0.18em; padding: 0.06em 0.5em 0.1em;
  border-radius: calc(var(--radius) - 4px);
  background: var(--primary-tint); color: var(--primary);
  font-size: 0.9em; font-weight: 500; line-height: 1.5;
  transition: background 140ms ease;
}
.tagchip:hover { background: var(--primary-tint-2); }
.checks { list-style: none; padding-left: 0.2em !important; }
.checks li { display: flex; align-items: baseline; gap: 9px; }
.checks li::before {
  content: ""; align-self: center;
  width: 15px; height: 15px; flex: none; border-radius: 5px;
  border: 1.5px solid var(--border-strong);
}
.checks li.done { color: var(--faint); text-decoration: line-through; text-decoration-color: color-mix(in srgb, var(--faint) 50%, transparent); }
.checks li.done::before {
  border-color: var(--primary); background: var(--primary);
  background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>');
  background-size: 10px; background-position: center; background-repeat: no-repeat;
}

.memo-imgs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-top: 11px; }
.memo-img {
  aspect-ratio: 1; border-radius: calc(var(--radius) - 1px); overflow: hidden;
  position: relative; border: 1px solid var(--border);
  transition: transform 180ms ease, box-shadow 180ms ease;
}
.memo-img:hover { transform: scale(1.02); box-shadow: var(--shadow-2); }
.memo-quote {
  display: flex; align-items: center; gap: 8px; margin-top: 11px;
  padding: 7px 12px; border-radius: calc(var(--radius) - 2px);
  background: var(--card-2); color: var(--muted-foreground);
  font-size: 12.5px; cursor: pointer;
  transition: background 150ms ease, color 150ms ease;
  overflow: hidden;
}
.memo-quote:hover { background: var(--primary-tint); color: var(--primary); }
.memo-quote svg { flex: none; opacity: 0.7; }
.memo-quote span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.feed-end { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 26px 0 10px; color: var(--faint); font-size: 12px; }
.feed-end i { width: 3px; height: 3px; border-radius: 50%; background: var(--faint); }

.alert {
  display: flex; align-items: center; gap: 10px;
  margin: 10px 4px 2px; padding: 10px 14px;
  border-radius: calc(var(--radius) + 2px);
  background: color-mix(in srgb, var(--accent) 9%, var(--card));
  border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border));
  font-size: 13px; color: var(--foreground);
}
.alert svg { color: var(--accent); flex: none; }
.alert .sp { flex: 1; }

/* 空状态 */
.empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  padding: 64px 20px; color: var(--faint); font-size: 13.5px;
  animation: fade-in 300ms ease both;
}
.empty svg { opacity: 0.4; }

/* ============================================================
   移动端（容器查询 ≤720px）— 笔记页
   ============================================================ */
.nb-appbar { display: none; }
.fab { display: none; }
.drawer-overlay, .sheet-overlay { position: absolute; inset: 0; z-index: 70; background: hsl(240 20% 4% / 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); animation: fade-in 220ms ease both; }
.drawer {
  position: absolute; z-index: 71; top: 0; bottom: 0; left: 0;
  width: min(300px, 84%);
  background: var(--background); border-right: 1px solid var(--border);
  box-shadow: var(--shadow-3);
  animation: drawer-in 300ms cubic-bezier(0.2, 0.9, 0.3, 1) both;
  display: flex; flex-direction: column;
}
.drawer .nb-side { width: 100%; padding: calc(18px + var(--safe-top)) 14px 16px; }
@keyframes drawer-in { from { transform: translateX(-100%); } to { transform: none; } }
.sheet {
  position: absolute; z-index: 71; left: 0; right: 0; bottom: 0;
  background: var(--card); border-top: 1px solid var(--border);
  border-radius: calc(var(--radius) + 10px) calc(var(--radius) + 10px) 0 0;
  box-shadow: var(--shadow-3);
  padding: 10px 14px calc(16px + var(--safe-bottom));
  animation: sheet-in 320ms cubic-bezier(0.2, 0.9, 0.3, 1) both;
}
.sheet-grip { width: 34px; height: 4px; border-radius: 3px; background: var(--border-strong); margin: 0 auto 10px; }
.sheet .composer { margin: 0; box-shadow: none; }
@keyframes sheet-in { from { transform: translateY(100%); } to { transform: none; } }

@container app (max-width: 720px) {
  .nb { padding: 0; gap: 0; }
  .nb > .nb-side { display: none; }
  .nb-main { width: 100%; padding-top: 0; }
  .nb-appbar {
    display: flex; align-items: center; gap: 6px; flex: none;
    padding: calc(8px + var(--safe-top)) 10px 8px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--card) 55%, transparent);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .nb-appbar .brand { padding: 0 2px; }
  .nb-top { padding: 6px 14px 0; height: 42px; }
  .nb-main > .composer { display: none; }
  /* 小屏编辑器工具栏空间有限：颜色标记改由卡片菜单承担 */
  .composer .cdots { display: none; }
  .feed { padding: 2px 14px calc(96px + var(--safe-bottom)); }
  .fab {
    display: flex; align-items: center; justify-content: center;
    position: absolute; z-index: 50; left: 50%; transform: translateX(-50%);
    bottom: calc(24px + var(--safe-bottom));
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--primary); color: var(--primary-foreground);
    box-shadow: 0 6px 20px -4px color-mix(in srgb, var(--primary) 55%, transparent), var(--shadow-2);
    transition: transform 160ms cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 160ms ease;
  }
  .fab:hover { transform: translateX(-50%) scale(1.06); }
  .fab:active { transform: translateX(-50%) scale(0.94); }
  .memo { padding: 13px 15px; border-radius: calc(var(--radius) + 3px); }
  .memo-imgs { gap: 5px; }
  .nb-search { width: 150px; }
  .nb-search:focus-within { width: 170px; }
}

/* ============================================================
   云盘页
   ============================================================ */
.dv { display: flex; height: 100%; padding: 12px; gap: 12px; }

.dv-rail {
  width: 218px; flex: none;
  display: flex; flex-direction: column; gap: 3px;
  padding: calc(10px + var(--safe-top)) 6px 8px;
  overflow-y: auto; scrollbar-width: none;
}
.dv-rail::-webkit-scrollbar { display: none; }
.rail-back {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; margin-bottom: 12px;
  border-radius: calc(var(--radius) - 2px);
  color: var(--muted-foreground); font-size: 13px; font-weight: 500;
  transition: color 150ms ease, background 150ms ease;
  width: fit-content;
}
.rail-back:hover { color: var(--foreground); background: var(--card-2); }
.dv-rail .brand { padding: 0 10px 16px; }
.rail-cta { margin: 0 4px 14px; display: flex; flex-direction: column; gap: 7px; }
.dv-rail .nav-item { font-size: 13.5px; }
.rail-note {
  margin-top: auto; padding: 12px 12px 6px; margin-bottom: 46px;
  font-size: 11.5px; line-height: 1.7; color: var(--faint);
}

.dv-canvas {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 7px);
  box-shadow: var(--shadow-1);
  overflow: hidden; position: relative;
}
.dv-toolbar {
  display: flex; align-items: center; gap: 8px; flex: none; flex-wrap: wrap;
  padding: calc(10px + var(--safe-top)) 14px 10px;
  border-bottom: 1px solid var(--border);
}
.crumbs { display: flex; align-items: center; gap: 2px; min-width: 0; overflow: hidden; }
.crumb {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 9px; border-radius: calc(var(--radius) - 3px);
  font-size: 13.5px; color: var(--muted-foreground); white-space: nowrap;
  transition: background 140ms ease, color 140ms ease;
}
.crumb:hover { background: var(--card-2); color: var(--foreground); }
.crumb.here { color: var(--foreground); font-weight: 600; }
.crumb.here:hover { background: transparent; }
.crumb-sep { color: var(--faint); flex: none; display: inline-flex; }
.dv-toolbar .sp { flex: 1; }
.dv-search { width: 190px; }

.dv-body { flex: 1; min-height: 0; overflow-y: auto; position: relative; }

/* 列表视图 */
.lhead, .lrow {
  display: grid; align-items: center;
  grid-template-columns: 40px 42px minmax(0, 1fr) 92px 168px 44px;
}
.lhead {
  position: sticky; top: 0; z-index: 5;
  padding: 7px 10px 7px 6px;
  font-size: 11.5px; font-weight: 500; letter-spacing: 0.06em; color: var(--faint);
  background: color-mix(in srgb, var(--card) 82%, transparent);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.lsort { display: inline-flex; align-items: center; gap: 4px; color: inherit; letter-spacing: inherit; transition: color 140ms ease; }
.lsort:hover, .lsort.active { color: var(--foreground); }
.lrows { padding: 5px 6px 90px; }
.lrow {
  padding: 4.5px 4px; border-radius: calc(var(--radius) - 1px);
  transition: background 130ms ease;
  position: relative;
  cursor: pointer;
}
.lrow:hover { background: var(--card-2); }
.lrow.sel { background: var(--primary-tint); }
.lrow.sel:hover { background: var(--primary-tint-2); }
.lrow .cbx { margin-left: 10px; opacity: 0; }
.lrow:hover .cbx, .lrow .cbx.on, .app.coarse .lrow .cbx, .dv-body.selecting .lrow .cbx { opacity: 1; }
.lname { display: flex; align-items: center; gap: 8px; min-width: 0; padding-right: 10px; }
.lname .nm {
  font-size: 13.5px; font-weight: 500; color: var(--foreground);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-align: left; transition: color 130ms ease;
}
.lname .nm:hover { color: var(--primary); }
.lmeta { font-size: 12px; color: var(--muted-foreground); font-variant-numeric: tabular-nums; white-space: nowrap; }
.lrow .row-menu { opacity: 0; transition: opacity 140ms ease; }
.lrow:hover .row-menu, .lrow .row-menu.open, .app.coarse .lrow .row-menu { opacity: 1; }
.lsub { display: none; font-size: 11.5px; color: var(--faint); font-variant-numeric: tabular-nums; }

.share-badge {
  display: inline-flex; align-items: center; gap: 3px; flex: none;
  padding: 1.5px 7px; border-radius: 99px;
  background: var(--primary-tint); color: var(--primary);
  font-size: 10.5px; font-weight: 600;
}
.chip-key {
  display: inline-flex; align-items: center; gap: 3px; flex: none;
  color: var(--accent); font-size: 11px;
}

/* 文件图标 */
.fico {
  width: 34px; height: 34px; flex: none;
  border-radius: calc(var(--radius) - 2px);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.fico.lg { width: 46px; height: 46px; border-radius: calc(var(--radius) + 1px); }
.fico svg { position: relative; z-index: 1; }

/* 文件图标着色（--fh/--fs 由 FileIcon 注入，跨主题保持类型可辨识） */
.fico { background: hsl(var(--fh) var(--fs) 50% / 0.13); color: hsl(var(--fh) var(--fs) 38%); }
[data-theme="dark"] .fico { background: hsl(var(--fh) var(--fs) 50% / 0.16); color: hsl(var(--fh) var(--fs) 66%); }
.fico .ph-img { border-radius: inherit; }
.crumb:disabled { cursor: default; }

/* 开关 */
.switch {
  position: relative; width: 36px; height: 21px; flex: none;
  border-radius: 99px; background: var(--card-2);
  border: 1px solid var(--border-strong);
  transition: background 180ms ease, border-color 180ms ease;
}
.switch i {
  position: absolute; top: 2px; left: 2px; width: 15px; height: 15px;
  border-radius: 50%; background: var(--muted-foreground);
  transition: transform 200ms cubic-bezier(0.34, 1.56, 0.64, 1), background 180ms ease;
}
.switch.on { background: var(--primary); border-color: var(--primary); }
.switch.on i { transform: translateX(15px); background: var(--primary-foreground); }

/* 分享对话框选项行 */
.share-opt { display: flex; align-items: center; gap: 8px; padding: 8px 2px; font-size: 13.5px; }
.share-opt .lbl { display: inline-flex; align-items: center; gap: 8px; color: var(--muted-foreground); }
.share-opt .sp { flex: 1; }
.pwd-code {
  font-family: var(--font-mono); font-size: 12.5px; letter-spacing: 0.12em;
  background: var(--card-2); padding: 2px 8px; border-radius: 6px;
}

/* 页面切换 */
.page { height: 100%; animation: page-in 260ms ease both; }
@keyframes page-in { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }

/* 网格视图 */
.gwrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 10px; padding: 14px 14px 96px; }
.gcard {
  position: relative;
  border-radius: calc(var(--radius) + 4px);
  border: 1px solid transparent;
  padding: 9px;
  transition: background 150ms ease, transform 180ms ease, box-shadow 180ms ease, border-color 150ms ease;
  animation: g-in 320ms ease both;
}
@keyframes g-in { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: none; } }
.gcard:hover { background: var(--card-2); transform: translateY(-2px); box-shadow: var(--shadow-2); }
.gcard.sel { background: var(--primary-tint); border-color: color-mix(in srgb, var(--primary) 40%, transparent); }
.gthumb {
  height: 86px; border-radius: calc(var(--radius) + 1px);
  display: flex; align-items: center; justify-content: center;
  background: var(--card-2); overflow: hidden; position: relative;
  margin-bottom: 9px;
}
.gcard:hover .gthumb { background: color-mix(in srgb, var(--card-2) 60%, var(--background)); }
.gname { font-size: 12.5px; font-weight: 500; line-height: 1.45; text-align: center; word-break: break-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.gsize { margin-top: 2px; font-size: 10.5px; color: var(--faint); text-align: center; font-variant-numeric: tabular-nums; }
.gcard .cbx { position: absolute; top: 15px; left: 15px; z-index: 3; opacity: 0; box-shadow: var(--shadow-1); }
.gcard:hover .cbx, .gcard .cbx.on, .app.coarse .gcard .cbx, .gwrap.selecting .gcard .cbx { opacity: 1; }
.gcard .row-menu {
  position: absolute; top: 11px; right: 11px; z-index: 3; opacity: 0;
  background: color-mix(in srgb, var(--card) 80%, transparent);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border-radius: 8px;
  transition: opacity 140ms ease;
}
.gcard:hover .row-menu, .gcard .row-menu.open, .app.coarse .gcard .row-menu { opacity: 1; }
.gbadge { position: absolute; bottom: 8px; right: 8px; z-index: 2; }

/* 简单列表（回收站 / 分享） */
.srow {
  display: flex; align-items: center; gap: 11px;
  padding: 8px 10px; border-radius: calc(var(--radius) - 1px);
  transition: background 130ms ease;
}
.srow:hover { background: var(--card-2); }
.srow .mid { flex: 1; min-width: 0; }
.srow .ttl { display: flex; align-items: center; gap: 8px; font-size: 13.5px; font-weight: 500; }
.srow .ttl span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.srow .sub { display: flex; align-items: center; gap: 6px; margin-top: 1px; font-size: 11.5px; color: var(--faint); min-width: 0; }
.srow .sub .loc { display: inline-flex; align-items: center; gap: 4px; min-width: 0; transition: color 130ms ease; }
.srow .sub .loc:hover { color: var(--primary); }
.srow .sub .loc span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.srow .acts { display: flex; gap: 2px; flex: none; }
.srows { padding: 8px 8px 90px; }

/* 选择操作栏 */
.selbar {
  position: absolute; z-index: 55; left: 50%; transform: translateX(-50%);
  bottom: calc(18px + var(--safe-bottom));
  display: flex; align-items: center; gap: 3px;
  padding: 6px 7px 6px 15px;
  background: color-mix(in srgb, var(--card) 88%, transparent);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: 99px; box-shadow: var(--shadow-3);
  animation: selbar-in 340ms cubic-bezier(0.26, 1.3, 0.42, 1) both;
  white-space: nowrap;
}
.selbar .cnt { font-size: 13px; font-weight: 600; margin-right: 9px; font-variant-numeric: tabular-nums; }
.selbar .div { width: 1px; height: 18px; background: var(--border); margin: 0 6px; }
@keyframes selbar-in { from { opacity: 0; transform: translateX(-50%) translateY(22px) scale(0.92); } to { opacity: 1; transform: translateX(-50%); } }

/* 拖拽上传 */
.dropzone {
  position: absolute; inset: 10px; z-index: 65;
  border-radius: calc(var(--radius) + 6px);
  border: 2px dashed color-mix(in srgb, var(--primary) 55%, transparent);
  background: color-mix(in srgb, var(--primary) 7%, var(--card) 60%);
  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  color: var(--primary); font-size: 14px; font-weight: 600;
  animation: fade-in 160ms ease both; pointer-events: none;
}
.dropzone svg { animation: bob 1.2s ease-in-out infinite; }
@keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }

/* 上传坞 */
.dock {
  position: absolute; z-index: 58; right: 16px;
  bottom: calc(16px + var(--safe-bottom));
  width: min(320px, calc(100% - 32px));
  background: var(--card); border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 5px); box-shadow: var(--shadow-3);
  overflow: hidden;
  animation: selbar-in2 340ms cubic-bezier(0.26, 1.3, 0.42, 1) both;
}
@keyframes selbar-in2 { from { opacity: 0; transform: translateY(22px) scale(0.95); } to { opacity: 1; transform: none; } }
.dock-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 8px 10px 15px;
  font-size: 13px; font-weight: 600;
  border-bottom: 1px solid var(--border);
}
.dock-head .sp { flex: 1; }
.dock-rows { max-height: 190px; overflow-y: auto; padding: 6px 8px 8px; }
.dock-row { display: flex; align-items: center; gap: 10px; padding: 6px 7px; border-radius: calc(var(--radius) - 2px); }
.dock-row .nm { flex: 1; min-width: 0; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dock-row .pct { font-size: 11px; color: var(--muted-foreground); font-variant-numeric: tabular-nums; width: 34px; text-align: right; }
.dock-row .done-ico { color: var(--primary); display: inline-flex; }
.dock-row svg.dim { color: var(--muted-foreground); flex: none; }
.bar { display: block; height: 4px; border-radius: 3px; background: var(--card-2); overflow: hidden; margin-top: 5px; }
.bar i {
  display: block; height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, color-mix(in srgb, var(--primary) 75%, white), var(--primary));
  transition: width 200ms ease;
}

/* 预览层 */
.preview {
  position: absolute; inset: 0; z-index: 90;
  background: hsl(240 25% 4% / 0.82);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  display: flex; flex-direction: column;
  animation: fade-in 220ms ease both;
}
.preview-top {
  display: flex; align-items: center; gap: 8px;
  padding: calc(12px + var(--safe-top)) 16px 12px;
  color: hsl(0 0% 100% / 0.92);
}
.preview-top .nm { font-size: 13.5px; font-weight: 500; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.preview-top .meta { font-size: 11.5px; color: hsl(0 0% 100% / 0.5); white-space: nowrap; }
.preview-top .sp { flex: 1; }
.preview-top .icon-btn { color: hsl(0 0% 100% / 0.75); }
.preview-top .icon-btn:hover { background: hsl(0 0% 100% / 0.12); color: white; }
.preview-stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px 74px 40px; position: relative; min-height: 0; }
.preview-img {
  max-width: 100%; max-height: 100%; width: 640px; aspect-ratio: 4 / 3;
  border-radius: 14px; box-shadow: 0 30px 80px -20px hsl(0 0% 0% / 0.6);
  animation: modal-in 300ms cubic-bezier(0.2, 0.9, 0.3, 1.1) both;
  position: relative; overflow: hidden;
}
.preview-file {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  color: hsl(0 0% 100% / 0.85); font-size: 14px;
  animation: modal-in 300ms cubic-bezier(0.2, 0.9, 0.3, 1.1) both;
}
.preview-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: hsl(0 0% 100% / 0.1); color: white;
  transition: background 150ms ease, transform 150ms ease;
}
.preview-nav:hover { background: hsl(0 0% 100% / 0.2); transform: translateY(-50%) scale(1.08); }
.preview-nav.prev { left: 18px; }
.preview-nav.next { right: 18px; }

/* 渐变占位图（模拟图片内容） */
.ph-img { position: absolute; inset: 0; }
.ph-img::after {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(circle at 28% 24%, hsl(0 0% 100% / 0.32), transparent 46%);
}

/* 云盘 · 移动端 */
.dv-mobilebar { display: none; }
@container app (max-width: 720px) {
  .dv { padding: 0; gap: 0; }
  .dv-rail { display: none; }
  .dv-canvas { border: none; border-radius: 0; box-shadow: none; background: transparent; }
  .dv-toolbar { background: color-mix(in srgb, var(--card) 55%, transparent); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); padding-top: calc(8px + var(--safe-top)); }
  .dv-mobilebar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px; border-bottom: 1px solid var(--border);
  }
  .dv-mobilebar .seg { flex: 1; display: flex; }
  .dv-mobilebar .seg-btn { flex: 1; }
  .lhead, .lrow { grid-template-columns: 36px 42px minmax(0, 1fr) 40px; }
  .lhead .col-size, .lhead .col-time, .lrow .lmeta { display: none; }
  .lname { flex-wrap: wrap; row-gap: 0; }
  .lsub { display: block; flex-basis: 100%; }
  .lrow { padding: 6px 4px; }
  .lrow .cbx { opacity: 1; margin-left: 6px; }
  .gwrap { grid-template-columns: repeat(auto-fill, minmax(124px, 1fr)); padding: 12px 12px 110px; }
  .gcard .cbx, .gcard .row-menu { opacity: 1; }
  .dv-search { width: 100%; flex: 1; }
  .fab-upload {
    display: flex; align-items: center; justify-content: center;
    position: absolute; z-index: 50; right: 18px;
    bottom: calc(24px + var(--safe-bottom));
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--primary); color: var(--primary-foreground);
    box-shadow: 0 6px 20px -4px color-mix(in srgb, var(--primary) 55%, transparent), var(--shadow-2);
    transition: transform 160ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .fab-upload:active { transform: scale(0.94); }
  .selbar { bottom: calc(88px + var(--safe-bottom)); max-width: calc(100% - 24px); overflow-x: auto; }
}
@container app (min-width: 721px) {
  .fab-upload { display: none; }
}

/* ============================================================
   Tweaks 调节面板（原型专用，非产品 UI）
   ============================================================ */
.tw-fab {
  position: fixed; z-index: 200; bottom: 16px; left: 16px;
  display: flex; align-items: center; gap: 7px;
  height: 34px; padding: 0 13px;
  border-radius: 99px;
  background: hsl(240 15% 10% / 0.72); color: hsl(0 0% 100% / 0.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 4px 16px hsl(0 0% 0% / 0.25), inset 0 0 0 1px hsl(0 0% 100% / 0.14);
  font-size: 12.5px; font-weight: 550;
  transition: transform 150ms ease, box-shadow 150ms ease;
}
.tw-fab:hover { transform: translateY(1px); box-shadow: 0 6px 20px hsl(0 0% 0% / 0.3), inset 0 0 0 1px hsl(0 0% 100% / 0.2); }
.tw-panel {
  position: fixed; z-index: 199; bottom: 58px; left: 16px;
  width: 248px; padding: 15px 15px 13px;
  background: hsl(240 15% 10% / 0.82); color: hsl(0 0% 100% / 0.94);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-radius: 15px;
  box-shadow: 0 16px 48px hsl(0 0% 0% / 0.4), inset 0 0 0 1px hsl(0 0% 100% / 0.13);
  animation: pop-in 200ms cubic-bezier(0.2, 0.9, 0.3, 1.15) both;
}
.tw-label { font-size: 10.5px; letter-spacing: 0.14em; color: hsl(0 0% 100% / 0.45); margin: 0 0 8px; font-weight: 600; }
.tw-row { margin-bottom: 14px; }
.tw-row:last-child { margin-bottom: 0; }
.tw-themes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.tw-swatch {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 7px 2px 6px; border-radius: 11px;
  transition: background 140ms ease;
}
.tw-swatch:hover { background: hsl(0 0% 100% / 0.08); }
.tw-swatch.on { background: hsl(0 0% 100% / 0.12); box-shadow: inset 0 0 0 1px hsl(0 0% 100% / 0.25); }
.tw-ball { width: 24px; height: 24px; border-radius: 50%; box-shadow: inset 0 0 0 1px hsl(0 0% 100% / 0.2); }
.tw-swatch span { font-size: 10.5px; color: hsl(0 0% 100% / 0.75); }
.tw-seg { display: flex; gap: 4px; padding: 3px; background: hsl(0 0% 100% / 0.08); border-radius: 10px; }
.tw-seg button {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  height: 27px; border-radius: 8px;
  font-size: 12px; color: hsl(0 0% 100% / 0.65);
  transition: background 140ms ease, color 140ms ease;
}
.tw-seg button.on { background: hsl(0 0% 100% / 0.16); color: white; }
.tw-hint { font-size: 10.5px; color: hsl(0 0% 100% / 0.4); line-height: 1.6; margin: 10px 0 0; }

/* ============================================================
   重设计新增 · 搜索页（浮层 / 抽屉）
   基因：从顶栏搜索入口滑出的独立搜索面；正文全文关键词；
   相关度/最新/最早排序；结果为笔记卡片 + 内联 <mark> 高亮。
   ============================================================ */
.nb-search-trigger {
  display: flex; align-items: center; gap: 8px;
  width: 210px; height: 34px; padding: 0 8px 0 11px;
  border-radius: calc(var(--radius) - 2px);
  background: var(--card-2); color: var(--muted-foreground);
  font-size: 13.5px; text-align: left;
  transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
}
.nb-search-trigger:hover { background: var(--card); color: var(--foreground); box-shadow: inset 0 0 0 1px var(--border); }
.nb-search-trigger svg { flex: none; opacity: 0.85; }
.nb-search-trigger .t-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nb-search-trigger kbd {
  flex: none; font-family: var(--font-mono); font-size: 10.5px; line-height: 1;
  padding: 3px 6px 4px; border-radius: 6px;
  background: color-mix(in srgb, var(--card) 70%, transparent);
  border: 1px solid var(--border); color: var(--faint);
}

/* 遮罩 + 面板 */
.srch-scrim {
  position: absolute; inset: 0; z-index: 100;
  display: flex; justify-content: center; align-items: flex-start;
  padding: 58px 20px 24px;
  background: hsl(240 22% 5% / 0.4);
  backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
  animation: fade-in 170ms ease both;
}
.srch {
  display: flex; flex-direction: column;
  width: min(664px, 100%); max-height: 100%;
  background: var(--card); border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 8px);
  box-shadow: var(--shadow-3);
  overflow: hidden;
  animation: srch-in 260ms cubic-bezier(0.2, 0.9, 0.3, 1.08) both;
}
@keyframes srch-in { from { opacity: 0; transform: translateY(-16px) scale(0.985); } to { opacity: 1; transform: none; } }

.srch-head {
  display: flex; align-items: center; gap: 11px; flex: none;
  padding: 15px 14px 15px 17px;
  border-bottom: 1px solid var(--border);
}
.srch-head > .lead { color: var(--muted-foreground); flex: none; display: inline-flex; }
.srch-input {
  flex: 1; min-width: 0; border: none; outline: none; background: transparent;
  font-size: 17px; line-height: 1.4; color: var(--foreground); letter-spacing: 0.01em;
}
.srch-input::placeholder { color: var(--faint); }
.srch-esc {
  flex: none; font-family: var(--font-mono); font-size: 10.5px; line-height: 1;
  padding: 4px 7px 5px; border-radius: 6px;
  background: var(--card-2); border: 1px solid var(--border); color: var(--faint);
}
.srch-cancel { flex: none; font-size: 14px; font-weight: 500; color: var(--primary); padding: 4px 4px; }

/* 工具行：结果数 + 排序 */
.srch-tools {
  display: flex; align-items: center; gap: 10px; flex: none;
  padding: 9px 15px; border-bottom: 1px solid var(--border);
}
.srch-count {
  font-family: var(--font-serif); font-size: 13px; color: var(--muted-foreground);
  font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
}
.srch-count b { color: var(--foreground); font-weight: 600; }
.srch-tools .sp { flex: 1; }

/* 结果 / 空态区 */
.srch-body { flex: 1; min-height: 0; overflow-y: auto; padding: 10px 14px 16px; }
.srch-body::-webkit-scrollbar { width: 8px; }

.srch-sec { margin-top: 18px; }
.srch-sec:first-child { margin-top: 6px; }
.srch-sec-h {
  display: flex; align-items: center; gap: 8px; margin: 0 6px 10px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.13em; color: var(--faint);
}
.srch-sec-h .ic { display: inline-flex; opacity: 0.9; }
.srch-sec-h .sp { flex: 1; }
.srch-sec-h .txt-btn { font-size: 11px; letter-spacing: 0.02em; font-weight: 500; color: var(--faint); }
.srch-sec-h .txt-btn:hover { color: var(--primary); }
.srch-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 6px; }
.srch-chip {
  display: inline-flex; align-items: center; gap: 7px;
  height: 32px; padding: 0 13px; border-radius: 99px;
  background: var(--card-2); color: var(--foreground); font-size: 13px;
  transition: background 140ms ease, color 140ms ease, box-shadow 140ms ease;
}
.srch-chip:hover { background: var(--primary-tint); color: var(--primary); }
.srch-chip .lead-ic { display: inline-flex; color: var(--faint); }
.srch-chip:hover .lead-ic { color: var(--primary); }
.srch-chip .hash { font-family: var(--font-serif); color: var(--faint); font-size: 13px; }
.srch-chip:hover .hash { color: var(--primary); }
.srch-chip .cnt { color: var(--faint); font-size: 11.5px; font-variant-numeric: tabular-nums; }
.srch-chip:hover .cnt { color: color-mix(in srgb, var(--primary) 75%, transparent); }
.srch-tip {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin: 4px 6px 0; font-size: 12px; line-height: 1.7; color: var(--faint);
}
.srch-tip code {
  font-family: var(--font-mono); font-size: 11.5px;
  background: var(--card-2); padding: 1.5px 6px; border-radius: 5px; color: var(--muted-foreground);
}

/* 结果项：复用 memo 卡片，加键盘游标高亮 */
.srch-hit { cursor: pointer; scroll-margin: 12px; }
.srch-hit .memo { margin-bottom: 10px; }
.srch-hit.cur .memo {
  border-color: color-mix(in srgb, var(--primary) 50%, var(--border));
  box-shadow: 0 0 0 3px var(--primary-tint), var(--shadow-2);
  transform: translateY(-1px);
}
.srch-empty-hits {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding: 52px 20px 40px; color: var(--faint); font-size: 13.5px; text-align: center;
  animation: fade-in 260ms ease both;
}
.srch-empty-hits svg { opacity: 0.4; }
.srch-empty-hits .q { color: var(--muted-foreground); font-weight: 500; }

/* 命中高亮（也用于卡片正文里的 <mark>） */
.memo-prose mark, .srch-body mark {
  background: var(--primary-tint-2); color: var(--primary);
  border-radius: 4px; padding: 0.02em 0.18em; font-weight: 600;
  box-decoration-break: clone; -webkit-box-decoration-break: clone;
}

/* ============================================================
   重设计新增 · 移动端编辑器（浮层 sheet → 全屏）
   基因：FAB 唤起底部编辑器；# 标签联想；草稿本地保存；
   16px 防 iOS 缩放；颜色标记仍由卡片菜单承担（不入编辑器）。
   ============================================================ */
.mc-sheet {
  position: absolute; z-index: 71; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  max-height: 90%;
  background: var(--card); border-top: 1px solid var(--border);
  border-radius: calc(var(--radius) + 12px) calc(var(--radius) + 12px) 0 0;
  box-shadow: var(--shadow-3);
  padding-bottom: calc(8px + var(--safe-bottom));
  animation: sheet-in 340ms cubic-bezier(0.2, 0.9, 0.3, 1) both;
}
.mc-full {
  position: absolute; z-index: 72; inset: 0;
  display: flex; flex-direction: column;
  background: var(--card);
  padding-bottom: calc(6px + var(--safe-bottom));
  animation: mc-full-in 300ms cubic-bezier(0.2, 0.9, 0.3, 1) both;
}
@keyframes mc-full-in { from { opacity: 0.5; transform: translateY(2.5%); } to { opacity: 1; transform: none; } }

.mc-grip { width: 38px; height: 4px; border-radius: 3px; background: var(--border-strong); margin: 9px auto 2px; flex: none; }
.mc-head { display: flex; align-items: center; gap: 8px; flex: none; padding: 7px 8px 7px 16px; }
.mc-full .mc-head { padding: calc(9px + var(--safe-top)) 8px 9px; border-bottom: 1px solid var(--border); }
.mc-head .mc-title { font-size: 13.5px; font-weight: 600; letter-spacing: 0.04em; color: var(--muted-foreground); }
.mc-full .mc-head .mc-title { flex: 1; text-align: center; color: var(--foreground); font-size: 15px; letter-spacing: 0.01em; }
.mc-head .sp { flex: 1; }
.mc-head .mark-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: 2px; }
.mc-head .mark-dot.red { background: hsl(0 72% 58%); box-shadow: 0 0 7px hsl(0 72% 58% / 0.5); }
.mc-head .mark-dot.blue { background: hsl(217 80% 60%); box-shadow: 0 0 7px hsl(217 80% 60% / 0.5); }
.mc-head .mark-dot.green { background: hsl(145 55% 47%); box-shadow: 0 0 7px hsl(145 55% 47% / 0.5); }

.mc-ta {
  flex: 1 1 auto; width: 100%; min-height: 104px;
  border: none; outline: none; resize: none; background: transparent;
  padding: 6px 16px 10px; font-size: 16px; line-height: 1.85; letter-spacing: 0.012em;
  color: color-mix(in srgb, var(--foreground) 92%, transparent);
}
.mc-sheet .mc-ta { max-height: 44vh; }
.mc-full .mc-ta { padding-top: 16px; }
.mc-ta::placeholder { color: var(--faint); }

/* # 标签联想条（贴在工具栏上方、键盘之上） */
.tag-suggest {
  display: flex; align-items: center; gap: 7px; flex: none;
  padding: 9px 14px; overflow-x: auto; scrollbar-width: none;
  border-top: 1px solid var(--border);
  background: color-mix(in srgb, var(--card-2) 50%, transparent);
  animation: tsug-in 200ms ease both;
}
.tag-suggest::-webkit-scrollbar { display: none; }
@keyframes tsug-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.tag-suggest .lbl { flex: none; font-size: 11px; color: var(--faint); letter-spacing: 0.04em; }
.tsug {
  display: inline-flex; align-items: center; gap: 5px; flex: none;
  height: 34px; padding: 0 13px; border-radius: 99px;
  background: var(--card); border: 1px solid var(--border);
  font-size: 13.5px; color: var(--foreground); white-space: nowrap;
  transition: background 130ms ease, border-color 130ms ease, color 130ms ease;
}
.tsug.cur, .tsug:hover { background: var(--primary-tint); border-color: color-mix(in srgb, var(--primary) 38%, var(--border)); color: var(--primary); }
.tsug .hash { font-family: var(--font-serif); color: var(--faint); }
.tsug.cur .hash, .tsug:hover .hash { color: var(--primary); }
.tsug .cnt { font-size: 11px; color: var(--faint); font-variant-numeric: tabular-nums; }
.tsug.new .hash { color: var(--primary); }

/* 工具栏（移动端 44px 触达） */
.mc-bar { display: flex; align-items: center; gap: 2px; flex: none; padding: 5px 9px 3px; }
.mc-full .mc-bar { padding: 6px 12px calc(6px + var(--safe-bottom)); border-top: 1px solid var(--border); }
.mc-tool {
  width: 44px; height: 44px; flex: none;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: calc(var(--radius) - 1px); color: var(--muted-foreground);
  transition: background 140ms ease, color 140ms ease, transform 110ms ease;
}
.mc-tool:hover, .mc-tool:active { background: var(--card-2); color: var(--foreground); }
.mc-tool:active { transform: scale(0.9); }
.mc-bar .sp { flex: 1; }
.mc-count { font-size: 12px; color: var(--faint); font-variant-numeric: tabular-nums; margin-right: 4px; }
.mc-publish { height: 40px; padding: 0 20px; border-radius: var(--radius); font-size: 14.5px; font-weight: 600; }
.mc-publish svg { margin-right: -2px; }

/* 移动端下的搜索面：全屏抽屉 */
@container app (max-width: 720px) {
  .nb-search-trigger { display: none; }
  .srch-scrim { padding: 0; align-items: stretch; }
  .srch {
    width: 100%; max-height: 100%; height: 100%;
    border: none; border-radius: 0; box-shadow: none;
    animation: mc-full-in 280ms cubic-bezier(0.2, 0.9, 0.3, 1) both;
  }
  .srch-head { padding-top: calc(13px + var(--safe-top)); }
  .srch-esc { display: none; }
}
</style>
</head>
