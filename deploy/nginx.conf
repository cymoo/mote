map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream app {
    server app:8000;
    keepalive 32;
}

server {
    listen 80;
    charset utf-8;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = / {
        return 301 /shared;
    }

    # Memo SPA — all unmatched paths fall back to index.html
    location /memo {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Auth endpoint used by nginx subrequests (also accessible directly)
    location = /api/auth {
        proxy_pass http://app;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # Protected uploads: nginx checks auth with the app before proxying the file
    location /uploads {
        auth_request /api/auth;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @unauthorized;
        error_page 403 = @forbidden;
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location @unauthorized {
        return 401 "Unauthorized";
        add_header Content-Type text/plain always;
    }

    location @forbidden {
        return 403 "Forbidden";
        add_header Content-Type text/plain always;
    }

    # All other backend routes
    location ~ ^/(api|tasks|shared|static)(/|$) {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
