# HTTP: ACME challenge for cert renewals, redirect everything else
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    # Mozilla Intermediate profile
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:MozSSL:10m;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options            "SAMEORIGIN"      always;
    add_header X-Content-Type-Options     "nosniff"         always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # Internal auth endpoint for uploads protection (not accessible externally)
    location = /api/auth {
        internal;
        proxy_pass              http://127.0.0.1:8000;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
    }

    # Protected user uploads — served directly by nginx, auth delegated to Go
    location /uploads/ {
        auth_request /api/auth;
        error_page 401 = @uploads_shared;
        alias        __APP_DIR__/uploads/;
    }

    # Internal Drive blob serving. Go validates auth/share access first and
    # then uses X-Accel-Redirect to let nginx handle Range requests efficiently.
    location ^~ /__mote_drive_blobs__/ {
        internal;
        sendfile on;
        tcp_nopush on;
        alias __APP_DIR__/uploads/drive/;
    }

    # Unauthenticated fallback: allow uploads when Referer comes from a /shared/ page
    location @uploads_shared {
        valid_referers ~^__DOMAIN__/shared/;
        if ($invalid_referer) {
            return 401;
        }
        root __APP_DIR__;
        try_files $uri =404;
    }

    # React SPA hashed assets (1-year cache; no add_header so security headers are inherited)
    location /memo/assets/ {
        alias   __APP_DIR__/web/assets/;
        expires 1y;
    }

    # React SPA
    location = /memo {
        return 301 /memo/;
    }

    location /memo/ {
        alias     __APP_DIR__/web/;
        index     index.html;
        try_files $uri $uri/ /memo/index.html;
    }

    # File upload endpoint — allow larger request body for photos
    location = /api/upload {
        client_max_body_size 20m;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Drive chunked upload — each chunk up to 16 MiB.
    location ^~ /api/drive/upload/chunk/ {
        client_max_body_size 16m;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Drive download / zip — long-running streams; do not timeout.
    location ^~ /api/drive/download {
        proxy_buffering    off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Public drive share links — anonymous access; no auth_request.
    location ^~ /shared-files/ {
        proxy_buffering    off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # All other requests → Go app (API, blog pages, health check)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
