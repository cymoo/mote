name: mote

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: prod
      HTTP_IP: 0.0.0.0
      DATABASE_URL: /data/app.db
      UPLOAD_PATH: /uploads
      REDIS_URL: redis:6379
    volumes:
      - app_data:/data
      - app_uploads:/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health | grep -q healthy"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - web:/srv/web:ro
      - caddy_data:/data
    depends_on:
      app:
        condition: service_started

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data

volumes:
  app_data:
  app_uploads:
  web:
  redis_data:
  caddy_data:
