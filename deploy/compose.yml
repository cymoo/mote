name: mote

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: prod
      HTTP_IP: 0.0.0.0
      DATABASE_URL: /data/app.db
      UPLOAD_PATH: /uploads
      REDIS_URL: redis:6379
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ../data:/data
      - ../uploads:/uploads
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health | grep -q healthy"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  redis_data:
