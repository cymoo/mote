# Host nginx config — proxies to the Docker web container (127.0.0.1:8080).
#
# Setup:
#   1. Copy to /etc/nginx/sites-available/mote
#   2. Replace "example.com" with your domain
#   3. ln -s /etc/nginx/sites-available/mote /etc/nginx/sites-enabled/mote
#   4. nginx -t && systemctl reload nginx
#   5. certbot --nginx -d your-domain.com --email you@example.com --agree-tos
#      (certbot issues the cert, adds the HTTPS server block, and sets up auto-renewal)
#   6. After certbot runs, optionally add inside the HTTPS server block:
#      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    server_tokens off;
    client_max_body_size 10m;

    access_log /var/log/nginx/mote_access.log;
    error_log  /var/log/nginx/mote_error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
